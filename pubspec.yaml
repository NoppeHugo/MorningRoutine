name: morning_routine
description: Morning Routine Builder - Build your perfect morning, block by block.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^13.0.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.1.0
  lucide_icons: ^0.257.0
  flutter_animate: ^4.3.0

  # Notifications
  flutter_local_notifications: ^16.0.0
  timezone: ^0.9.2

  # In-App Purchases
  purchases_flutter: ^7.0.0

  # iOS Widgets
  home_widget: ^0.6.0

  # Utils
  uuid: ^4.2.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
